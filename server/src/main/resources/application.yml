server:
  port: ${PORT:8080}

spring:
  application:
    name: london-meet-backend
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/london_meet?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework: ${LOG_LEVEL_SPRING:INFO}
    org.springframework.boot.autoconfigure: ${LOG_LEVEL_AUTOCONFIG:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_SQL_BIND:WARN}

jwt:
  secret-key: ${JWT_SECRET:londonmeetjwtsecretkeylondonmeetjwtsecretkey}
  expiration: ${JWT_EXPIRATION:604800000}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

wechat:
  app-id: ${WECHAT_APP_ID:}
  secret: ${WECHAT_APP_SECRET:${WECHAT_SECRET:}}
  
upload:
  default-avatar-url: ${DEFAULT_AVATAR_URL:https://dummyimage.com/300x300/ffffff/111111.png&text=Avatar}
  default-cover-url: ""

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  upload-preset: ${CLOUDINARY_UPLOAD_PRESET:}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
