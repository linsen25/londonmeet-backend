server:
  port: 8080

spring:
  application:
    name: london-meet-backend

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/london_meet?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret-key: londonmeetjwtsecretkeylondonmeetjwtsecretkey
  expiration: ${JWT_EXPIRATION:604800000}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}

wechat:
  mock-enabled: true
  app-id: wx1f685f2109d776a0
  secret: edd9927fb9d9e2fdc2113fd014dd95d2
  
upload:
  avatar-dir: ${AVATAR_UPLOAD_DIR:server/uploads/avatar}
  avatar-url-prefix: /uploads/avatar
  default-avatar-url: /uploads/avatar/default-avatar.png
  cover-dir: ${COVER_UPLOAD_DIR:server/uploads/cover}
  cover-url-prefix: /uploads/cover
  default-cover-url: ""

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:ddkqatprj}
  upload-preset: ${CLOUDINARY_UPLOAD_PRESET:londonmeet}

google:
  maps:
    api-key: AIzaSyCnzsmZhct_1gQyVg1-_D7gz9LbKylYdMo
