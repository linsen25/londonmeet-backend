server:
  port: 8080

spring:
  application:
    name: london-meet-backend

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/london_meet?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret-key: ${JWT_SECRET:londonmeet-dev-only-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:604800000}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}

wechat:
  mock-enabled: ${WECHAT_MOCK_ENABLED:true}
  app-id: ${WECHAT_APP_ID:}
  secret: ${WECHAT_SECRET:}
  
upload:
  avatar-dir: ${AVATAR_UPLOAD_DIR:uploads/avatar}
  avatar-url-prefix: /uploads/avatar
  default-avatar-url: /uploads/avatar/default-avatar.png
  cover-dir: ${COVER_UPLOAD_DIR:uploads/cover}
  cover-url-prefix: /uploads/cover
  default-cover-url: https://dummyimage.com/1200x800/2b2b2b/ffffff.png&text=Cover

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  upload-preset: ${CLOUDINARY_UPLOAD_PRESET:}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
