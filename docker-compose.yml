services:
  mysql:
    image: mysql:8.0
    container_name: london-meet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-london_meet}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3306:3306"
    volumes:
      - london_meet_mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: london-meet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - london_meet_redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: london-meet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - london_meet_rabbitmq_data:/var/lib/rabbitmq

volumes:
  london_meet_mysql_data:
  london_meet_redis_data:
  london_meet_rabbitmq_data:
